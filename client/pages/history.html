<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History & Audit Logs | Personal Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/api.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <div class="sidebar">
      <div class="brand">
        <div class="brand-icon">XP</div>
        <span class="brand-name">ExpTracker</span>
      </div>
      <ul class="nav-links">
        <li class="nav-item">
          <a href="dashboard.html" class="nav-link">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="transactions.html" class="nav-link">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            <span>Transactions</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="categories.html" class="nav-link">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <span>Categories</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="history.html" class="nav-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>History</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="profile.html" class="nav-link">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
            <span>Profile</span>
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="theme-toggle-btn">Dark Mode</button>
        <div class="user-badge">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="user-info">
            <span class="user-name" id="user-name">User Name</span>
            <span class="user-email" id="user-email">user@email.com</span>
          </div>
        </div>
        <a href="#" id="logout-btn" class="nav-link" style="margin-top: 0.5rem; border: 1px solid var(--border)">
          <svg viewBox="0 0 24 24" style="stroke: currentColor;"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span>Logout</span>
        </a>
      </div>
    </div>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="header-container">
        <div class="page-title-section">
          <h1 class="page-title">Activity History</h1>
          <p class="page-subtitle">Track modifications, additions, and deletions of transactions</p>
        </div>
      </div>

      <!-- Filters Bar -->
      <div class="filters-bar" style="margin-bottom: 2rem;">
        <div style="display: flex; gap: 1rem; align-items: center; width: 100%; flex-wrap: wrap;">
          <div style="display: flex; flex-direction: column; gap: 0.25rem; min-width: 180px;">
            <label for="action-filter" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Filter Action Type</label>
            <select id="action-filter" class="form-control">
              <option value="">All Actions</option>
              <option value="CREATE">Create</option>
              <option value="UPDATE">Update</option>
              <option value="DELETE">Delete</option>
            </select>
          </div>
          
          <div style="margin-top: auto; margin-left: auto;">
            <button class="btn btn-secondary" id="clear-history-filters-btn">Clear Filter</button>
          </div>
        </div>
      </div>

      <!-- Timeline Logs List -->
      <div class="audit-timeline" id="audit-timeline-container">
        <!-- Dynamic audit items go here -->
        <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 4rem 0;">
          Loading activity history logs...
        </p>
      </div>

      <!-- Pagination Footer -->
      <div class="pagination-container" style="margin-top: 2rem;">
        <div class="pagination-info" id="pagination-info">
          Showing 0 to 0 of 0 entries
        </div>
        <div class="pagination-buttons">
          <button class="btn btn-secondary btn-icon-only" id="prev-page-btn" disabled>&lt;</button>
          <button class="btn btn-secondary btn-icon-only" id="next-page-btn" disabled>&gt;</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/history.js"></script>
</body>
</html>
