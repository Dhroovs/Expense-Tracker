<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Spendora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/api.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card glass-panel">
    <div class="auth-header">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 1.5rem; gap: 0.5rem;">
        <div class="brand-icon" style="background: none; box-shadow: none; width: auto; height: auto;">
          <svg viewBox="0 0 24 24" style="width: 48px; height: 48px; display: block;" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 8a4 4 0 1 1 8 0z" fill="var(--warning)" stroke="var(--warning)" stroke-width="1.5" />
            <rect x="3" y="8" width="18" height="13" rx="2" fill="var(--bg-secondary)" stroke="currentColor" />
            <path d="M16 11h4a1 1 0 0 1 1 1v3a1 1 0 0 1 -1 1h-4" fill="var(--bg-secondary)" stroke="currentColor" />
            <circle cx="18" cy="13.5" r="0.75" fill="currentColor" stroke="none" />
          </svg>
        </div>
        <span style="font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Spendora</span>
      </div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Get started tracking your income and expenses</p>
    </div>
    
    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" required minlength="8">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 0.8rem;">
        Register
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Already have an account? <a href="login.html" class="auth-link">Log in here</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
